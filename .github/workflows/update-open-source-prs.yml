name: Update Open Source PR List

on:
  schedule:
    - cron: '17 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-open-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update README open PR section
        id: update
        uses: actions/github-script@v7
        env:
          GH_USERNAME: wwenrr
        with:
          script: |
            const run = require('./.github/scripts/update-open-source-prs.js');
            await run({ github, core, context });

      - name: Commit changes
        run: |
          if git diff --quiet README.md; then
            echo "No README changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore(profile): update open source open PR list"
          git push
